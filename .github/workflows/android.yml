name: Android AAR

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        abi: [arm64-v8a, armeabi-v7a, x86, x86_64]

    steps:
      - uses: actions/checkout@v4

      - name: Normalize config
        run: |
          sed -i 's/\r$//' BUILD_CONFIG.env
          grep -vE '^(#|$)' BUILD_CONFIG.env >> "$GITHUB_ENV"

      - name: Prepare scripts
        run: |
          sed -i 's/\r$//' scripts/*.sh
          chmod +x scripts/*.sh

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Verify Rust targets
        run: rustup target list --installed

      - name: Install protoc and patchelf
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler patchelf
          which protoc && protoc --version
          which patchelf && patchelf --version

      - name: Fetch EasyTier
        run: bash ./scripts/fetch_easytier.sh --url "$REPO_URL" ${ET_REF:+--ref "$ET_REF"}

      - name: Build for ${{ matrix.abi }}
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          PROTOC: /usr/bin/protoc
          ABIS: ${{ matrix.abi }}
        run: bash ./scripts/build_android.sh

      - name: Normalize outputs to dist
        run: |
          set -e
          abi='${{ matrix.abi }}'
          mkdir -p "dist/$abi"
          if [ ! -f "dist/$abi/libeasytier_android_jni.so" ]; then
            echo "ERROR: libeasytier_android_jni.so not found for $abi"
            find dist third_party/easytier/target -type f -name 'libeasytier_android_jni.so' -print || true
            exit 1
          fi
          if [ ! -f "dist/$abi/libeasytier_ffi.so" ]; then
            echo "ERROR: libeasytier_ffi.so not found for $abi"
            find dist third_party/easytier/target -type f -name 'libeasytier_ffi.so' -print || true
            exit 1
          fi
          find dist -maxdepth 2 -type f -print

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.abi }}
          path: |
            dist/${{ matrix.abi }}/libeasytier_android_jni.so
            dist/${{ matrix.abi }}/libeasytier_ffi.so

  package:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Load config
        run: |
          sed -i 's/\r$//' BUILD_CONFIG.env
          grep -vE '^(#|$)' BUILD_CONFIG.env >> "$GITHUB_ENV"

      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Zip libs
        run: |
          set -e
          mkdir -p artifacts
          ref="${ET_REF:-unknown}"
          ndk="${NDK_VERSION:-unknown}"
          ref_sanitized="${ref//\//-}"
          zip -r "artifacts/libs-${ref_sanitized}-${ndk}.zip" dist

      - uses: actions/upload-artifact@v4
        with:
          name: easytier-android-jni-libs
          path: artifacts/*.zip

  build-aar:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download all ABI libs
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Copy libs into jniLibs
        run: |
          set -e
          JNI_DIR="android/library/src/main/jniLibs"
          for abi in arm64-v8a armeabi-v7a x86 x86_64; do
            mkdir -p "$JNI_DIR/$abi"
            for lib in libeasytier_ffi.so libeasytier_android_jni.so; do
              src="dist/$abi/$lib"
              if [ -f "$src" ]; then
                cp "$src" "$JNI_DIR/$abi/"
                echo "Copied $abi/$lib"
              else
                echo "ERROR: $src not found"
                find dist -type f -print
                exit 1
              fi
            done
          done
          find "$JNI_DIR" -name '*.so' -print

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.5

      - name: Build AAR
        run: |
          cd android
          gradle :library:assembleRelease

      - name: Setup Android NDK for diagnostics
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27

      - name: Diagnose native libraries
        continue-on-error: true
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          sed -i 's/\r$//' scripts/*.sh
          chmod +x scripts/*.sh
          bash ./scripts/diagnose_native.sh
          echo "===== diagnostics tail ====="
          tail -n 240 artifacts/easytier-native-diagnostics.txt || true

      - name: Collect AAR
        if: always()
        run: |
          mkdir -p artifacts
          find android/library/build/outputs -name '*.aar' -exec cp {} artifacts/ \;
          ls -lh artifacts/

      - name: Load config for naming
        run: |
          sed -i 's/\r$//' BUILD_CONFIG.env
          grep -vE '^(#|$)' BUILD_CONFIG.env >> "$GITHUB_ENV"

      - name: Rename AAR
        if: always()
        run: |
          ref="${ET_REF:-unknown}"
          ref_sanitized="${ref//\//-}"
          dev="${DEVELOPER:-unknown}"
          cd artifacts
          shopt -s nullglob
          for f in *.aar; do
            mv "$f" "easytier-${ref_sanitized}-${dev}.aar"
          done
          ls -lh

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: easytier-aar
          path: artifacts/*.aar
          if-no-files-found: warn

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: easytier-native-diagnostics
          path: artifacts/easytier-native-diagnostics.txt
          if-no-files-found: warn
