name: Android static lib

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        abi: [arm64-v8a, armeabi-v7a, x86, x86_64]

    steps:
      - uses: actions/checkout@v4

      - name: Normalize config
        run: |
          sed -i 's/\r$//' BUILD_CONFIG.env
          grep -vE '^(#|$)' BUILD_CONFIG.env >> "$GITHUB_ENV"

      - name: Prepare scripts
        run: |
          sed -i 's/\r$//' scripts/*.sh
          chmod +x scripts/*.sh

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: ${{ env.NDK_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.RUST_TARGETS }}

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          which protoc && protoc --version

      - name: Fetch EasyTier
        run: bash ./scripts/fetch_easytier.sh --url "$REPO_URL" ${ET_REF:+--ref "$ET_REF"}

      - name: Build for ${{ matrix.abi }}
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          PROTOC: /usr/bin/protoc
          ABIS: ${{ matrix.abi }}
        run: bash ./scripts/build_android.sh

      - name: Normalize outputs to dist
        run: |
          set -e
          abi='${{ matrix.abi }}'
          case "$abi" in
            arm64-v8a)    triple=aarch64-linux-android ;;
            armeabi-v7a)  triple=armv7-linux-androideabi ;;
            x86)          triple=i686-linux-android ;;
            x86_64)       triple=x86_64-linux-android ;;
            *) echo "Unknown ABI: $abi"; exit 1 ;;
          esac
          mkdir -p "dist/$abi"
          if [ ! -f "dist/$abi/libeasytier_ffi.a" ]; then
            src=$(find third_party/easytier/target/$triple -type f -name 'libeasytier_ffi.a' | head -n1 || true)
            if [ -n "$src" ]; then
              cp "$src" "dist/$abi/libeasytier_ffi.a"
            else
              echo "ERROR: libeasytier_ffi.a not found for $abi (triple: $triple)"
              find third_party/easytier/target/$triple -maxdepth 3 -type f -name 'libeasytier_ffi.*' -print || true
              exit 1
            fi
          fi
          find dist -maxdepth 2 -type f -print

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.abi }}
          path: dist/${{ matrix.abi }}/libeasytier_ffi.a

  package:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Load config
        run: |
          sed -i 's/\r$//' BUILD_CONFIG.env
          grep -vE '^(#|$)' BUILD_CONFIG.env >> "$GITHUB_ENV"

      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Zip libs
        run: |
          set -e
          mkdir -p artifacts
          ref="${ET_REF:-unknown}"
          ndk="${NDK_VERSION:-unknown}"
          ref_sanitized="${ref//\//-}"
          zip -r "artifacts/libs-${ref_sanitized}-${ndk}.zip" dist

      - uses: actions/upload-artifact@v4
        with:
          name: libeasytier_ffi-android-libs
          path: artifacts/*.zip

  build-aar:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download all ABI libs
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Copy libs into jniLibs
        run: |
          set -e
          JNI_DIR="android/library/src/main/jniLibs"
          for abi in arm64-v8a armeabi-v7a x86 x86_64; do
            mkdir -p "$JNI_DIR/$abi"
            src="dist/$abi/libeasytier_ffi.a"
            if [ -f "$src" ]; then
              cp "$src" "$JNI_DIR/$abi/"
              echo "Copied $abi"
            else
              echo "WARNING: $src not found, skipping $abi"
            fi
          done
          find "$JNI_DIR" -name '*.a' -print

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle wrapper & build AAR
        run: |
          cd android
          gradle wrapper --gradle-version 8.5
          ./gradlew :library:assembleRelease

      - name: Collect AAR
        run: |
          mkdir -p artifacts
          find android/library/build/outputs -name '*.aar' -exec cp {} artifacts/ \;
          ls -lh artifacts/

      - name: Load config for naming
        run: |
          sed -i 's/\r$//' BUILD_CONFIG.env
          grep -vE '^(#|$)' BUILD_CONFIG.env >> "$GITHUB_ENV"

      - name: Rename AAR
        run: |
          ref="${ET_REF:-unknown}"
          ref_sanitized="${ref//\//-}"
          dev="${DEVELOPER:-unknown}"
          cd artifacts
          for f in *.aar; do
            mv "$f" "easytier-${ref_sanitized}-${dev}.aar"
          done
          ls -lh

      - uses: actions/upload-artifact@v4
        with:
          name: easytier-aar
          path: artifacts/*.aar
